<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>책갈피 — AI 독서 첨삭 플랫폼 (프로토타입 v0.7)</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
:root{
  --navy:#0f1d3d; --navy2:#1b2e5a; --sky:#3aa0e0; --sky-d:#2b86c4;
  --mint:#2fc89b; --amber:#f5b53d; --rose:#fb7185; --violet:#8b7cf0;
  --bg:#f5f8fc; --card:#ffffff; --line:#e9eef5; --ink:#1e293b; --mut:#71809a;
  --shadow:0 4px 18px rgba(15,29,61,.06); --shadow-lg:0 18px 44px rgba(15,29,61,.16); --r:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none}
.hidden{display:none!important}
header{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;display:flex;align-items:center;gap:14px;padding:12px 22px}
.logo{font-weight:800;font-size:20px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.logo .mark{width:30px;height:30px;background:var(--sky);border-radius:8px;display:grid;place-items:center;font-size:18px}
header .sp{flex:1}
.badge-pt{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:999px;font-weight:700;font-size:14px;display:flex;gap:6px;align-items:center}
.who{font-size:13px;opacity:.85}
.btn{background:var(--sky);color:#fff;padding:10px 16px;border-radius:12px;font-weight:700;font-size:14px;transition:.15s}
.btn:hover{background:var(--sky-d)}
.btn.ghost{background:rgba(255,255,255,.12);color:#fff}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
.btn.out{background:#fff;color:var(--navy);border:1.5px solid var(--line)}
.btn.warn{background:var(--amber);color:#3a2c00}
.btn.mut{background:#eef2f7;color:var(--mut)}
.btn.block{width:100%}
.wrap{max-width:1080px;margin:0 auto;padding:22px}
nav.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
nav.tabs button{background:#fff;border:1.5px solid var(--line);color:var(--mut);padding:9px 15px;border-radius:999px;font-weight:600;font-size:14px}
nav.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
.card h2{font-size:18px;margin-bottom:4px;letter-spacing:-.4px}
.card .sub{color:var(--mut);font-size:13.5px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}}
label{font-weight:600;font-size:13.5px;display:block;margin:10px 0 5px}
input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:14.5px;font-family:inherit;background:#fbfcfe}
textarea{min-height:120px;resize:vertical;line-height:1.7}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--sky)}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.pill.A{background:#dcfce7;color:#15803d}.pill.B{background:#dbeafe;color:#1d4ed8}.pill.C{background:#fef3c7;color:#b45309}
.muted{color:var(--mut);font-size:13px}
.hero{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:var(--r);padding:30px;margin-bottom:18px;position:relative;overflow:hidden}
.hero h1{font-size:26px;letter-spacing:-.8px;margin-bottom:8px}
.hero p{opacity:.9;font-size:15px;max-width:660px}
.hero .blob{position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,var(--sky),transparent 70%);opacity:.4}
.row{display:flex;align-items:center;gap:12px}
.list-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:#fbfcfe}
.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:22px;background:#eaf6fd;flex:none}
.rank-no{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-weight:800;background:#eef2f7;color:var(--mut);flex:none}
.rank-no.r1{background:#fff7db;color:#b8860b}.rank-no.r2{background:#eef1f5;color:#6b7280}.rank-no.r3{background:#fbe9df;color:#b4612f}
.bar{height:9px;border-radius:99px;background:#eef2f7;overflow:hidden}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--mint))}
.fb-block{border-radius:14px;padding:14px 16px;margin-bottom:10px;border-left:5px solid}
.fb-praise{background:#f0fdf4;border-color:var(--mint)}
.fb-fix{background:#fffbeb;border-color:var(--amber)}
.fb-grow{background:#eef2ff;border-color:var(--violet)}
.fb-block b{display:block;margin-bottom:4px;font-size:14px}
.fb-block p{font-size:14px;color:#374151}
.stat{background:#fbfcfe;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.stat .n{font-size:24px;font-weight:800;color:var(--navy)}
.stat .l{font-size:12.5px;color:var(--mut)}
.shopitem{border:1.5px solid var(--line);border-radius:14px;padding:16px;text-align:center;background:#fbfcfe}
.shopitem .ic{font-size:40px}
.shopitem.owned{border-color:var(--mint);background:#f0fdf4}
.step-dots{display:flex;gap:6px;margin-bottom:16px}
.step-dots i{flex:1;height:6px;border-radius:99px;background:#e4ebf3}
.step-dots i.on{background:var(--sky)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 22px;border-radius:14px;font-weight:600;box-shadow:var(--shadow);z-index:100;opacity:0;transition:.3s}
.toast.show{opacity:1}
.tag{font-size:11.5px;color:var(--mut);background:#eef2f7;padding:3px 8px;border-radius:6px}
.empty{text-align:center;color:var(--mut);padding:30px}
.note{background:#eef6fb;border:1px dashed var(--sky);border-radius:12px;padding:12px 14px;font-size:13px;color:#15506b}
.seg{display:flex;gap:6px;background:#eef2f7;border-radius:12px;padding:4px;margin-bottom:14px;flex-wrap:wrap}
.seg button{flex:1;background:transparent;color:var(--mut);padding:8px 10px;border-radius:9px;font-weight:700;font-size:13.5px;min-width:90px}
.seg button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
.sch-results{max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:12px;margin-top:6px}
.sch-results div{padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px}
.sch-results div:hover{background:#eaf6fd}
.sch-results div b{font-weight:700}
.sch-results div span{color:var(--mut);font-size:12.5px;margin-left:6px}
.sel-school{background:#eaf6fd;border:1.5px solid var(--sky);border-radius:12px;padding:10px 13px;font-weight:700;color:var(--navy);display:flex;justify-content:space-between;align-items:center}
.season{background:linear-gradient(120deg,#7c3aed,#2563eb);color:#fff;border-radius:var(--r);padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.season .dday{background:rgba(255,255,255,.18);padding:6px 12px;border-radius:999px;font-weight:800}
.challenge{border:2px solid var(--amber);border-radius:var(--r);padding:18px;background:#fffdf5;margin-bottom:18px}
.wjgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:360px;margin:8px 0 4px}
.wjcell{aspect-ratio:1;border:1px solid #e4c9a0;background:#fffdf5;display:flex;align-items:center;justify-content:center;font-size:15px;border-radius:3px}
.wjcell.filled{background:#fff}
.wjwrap{position:relative;width:max-content;max-width:100%;margin:8px 0}
.wjsheet{display:grid;grid-template-columns:repeat(20,26px);grid-auto-rows:26px;background:#fff;border:2px solid #e88a8a;border-radius:5px;box-shadow:var(--shadow)}
.wjcell2{border-right:1px solid #f3cccc;border-bottom:1px solid #f3cccc;display:flex;align-items:center;justify-content:center;font-size:16px;color:#222;box-sizing:border-box}
.wjta{position:absolute;top:2px;left:2px;width:520px;height:260px;background:transparent;border:none;outline:none;resize:none;margin:0;padding:0;color:transparent;caret-color:#0d1b3a;font-size:16px;line-height:26px;letter-spacing:10px;font-family:inherit;overflow:hidden;white-space:pre-wrap;word-break:break-all}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{animation:fadeUp .28s ease both}
.btn{transition:.15s}.btn:active{transform:scale(.97)}
.list-item{transition:.15s}.list-item:hover{border-color:var(--sky)}
.shopitem{transition:.15s}.shopitem:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
nav.tabs button{transition:.15s}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-12px) rotate(4deg)}}
.floaty{position:absolute;opacity:.55;font-size:30px;animation:floaty 5s ease-in-out infinite;pointer-events:none}
.pill{transition:.15s}
footer{text-align:center;color:var(--mut);font-size:12px;padding:22px 10px;line-height:1.7}
.gradtext{background:linear-gradient(90deg,var(--sky),var(--mint));-webkit-background-clip:text;background-clip:text;color:transparent}
/* ===== UI 완성도 폴리시 ===== */
body{background:linear-gradient(180deg,#e9f1fb,var(--bg) 260px)}
header{background:linear-gradient(100deg,#0d1b3a,#1d3a6b);box-shadow:0 2px 14px rgba(13,27,58,.18)}
.logo .mark{box-shadow:0 0 0 3px rgba(60,180,232,.25);animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.btn:not(.out):not(.ghost):not(.mut):not(.warn){background:linear-gradient(135deg,var(--sky),var(--sky-d))}
.btn:not(.out):not(.ghost):not(.mut):not(.warn):hover{filter:brightness(1.06);background:linear-gradient(135deg,var(--sky),var(--sky-d))}
.stat{transition:.15s}.stat:hover{transform:translateY(-2px);border-color:var(--sky)}
.avatar{box-shadow:inset 0 0 0 1px rgba(13,27,58,.06)}
.card h2{display:flex;align-items:center;gap:7px}
.pill{box-shadow:0 1px 2px rgba(0,0,0,.05)}
.hero{box-shadow:0 10px 30px rgba(13,27,58,.18)}
::-webkit-scrollbar{height:9px;width:9px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}::-webkit-scrollbar-thumb:hover{background:#94a3b8}
.list-item{transition:.15s}.list-item:hover{transform:translateX(2px)}
.shopitem .ic{transition:.2s}.shopitem:hover .ic{transform:scale(1.12) rotate(-4deg)}
/* ===== 디자인 리프레시 (타이포·컴포넌트 정제) ===== */
body{font-family:'Pretendard','Pretendard Variable','Apple SD Gothic Neo','Malgun Gothic',sans-serif;letter-spacing:-.01em;-webkit-font-smoothing:antialiased}
.wrap{max-width:1040px}
.card{border-radius:var(--r);box-shadow:var(--shadow);padding:24px;border-color:var(--line)}
.card h2{font-size:18.5px;font-weight:800;letter-spacing:-.025em;color:#14264a}
.card .sub{color:var(--mut)}
.hero{box-shadow:var(--shadow-lg);border-radius:24px}
.hero h1{font-size:27px;font-weight:800;letter-spacing:-.03em}
.btn{border-radius:13px;font-weight:700;letter-spacing:-.01em;box-shadow:0 2px 6px rgba(15,29,61,.06)}
.btn.out{box-shadow:none}
nav.tabs button{border-radius:13px;border:1px solid var(--line);background:#fff;font-weight:700;box-shadow:0 1px 3px rgba(15,29,61,.04)}
nav.tabs button.on{background:var(--navy);border-color:var(--navy);box-shadow:0 4px 12px rgba(15,29,61,.18)}
input,select,textarea{border-radius:13px;border-color:var(--line);background:#fbfcfe}
.stat{border-radius:16px}.stat .n{font-weight:800;letter-spacing:-.02em}
.pill{font-weight:800;letter-spacing:-.01em}
.seg{border-radius:15px;background:#eef2f8}.seg button{border-radius:11px;font-weight:700}
header{padding:13px 24px}
.list-item{border-radius:15px}
.badge-pt{font-weight:800;letter-spacing:-.01em}
.note{border-radius:14px}
.fb-block{border-radius:15px}
/* ===== 교사 관리 콘솔 사이드바 (정보이음 벤치마크) ===== */
.tshell{display:flex;gap:18px;align-items:flex-start}
.tside{width:230px;flex:none;position:sticky;top:74px;background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px 12px}
.tside-head{display:flex;align-items:center;gap:9px;padding:6px 8px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
.tside-head .tmark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;display:grid;place-items:center;font-size:18px;flex:none}
.tside-head .tt{font-weight:800;font-size:14px;color:#14264a;line-height:1.25}
.tside-head .ts{font-size:11.5px;color:var(--mut)}
.tside .grp{font-size:11px;font-weight:800;color:#9aa6bd;letter-spacing:.04em;margin:13px 8px 5px}
.tside .grp:first-of-type{margin-top:2px}
.tside button{display:flex;align-items:center;gap:10px;width:100%;background:transparent;color:#41506b;padding:10px 12px;border-radius:11px;font-weight:700;font-size:14px;text-align:left;margin-bottom:2px;transition:.15s}
.tside button:hover{background:#eef4fb;color:#14264a}
.tside button.on{background:var(--navy);color:#fff;box-shadow:0 4px 12px rgba(15,29,61,.18)}
.tside button .ico{font-size:16px;width:20px;text-align:center;flex:none}
.tside .master{margin-top:10px;padding:9px 11px;background:linear-gradient(135deg,#fff7db,#fde6c2);border:1px solid #f0d68a;border-radius:12px;font-size:11.5px;color:#8a6312;font-weight:700;display:flex;align-items:center;gap:7px}
.tmain{flex:1;min-width:0}
@media(max-width:860px){
  .tshell{flex-direction:column}
  .tside{width:100%;position:static;display:flex;gap:6px;overflow-x:auto;padding:9px 10px;align-items:center}
  .tside-head,.tside .grp,.tside .master{display:none}
  .tside button{width:auto;white-space:nowrap;margin-bottom:0;padding:9px 13px}
}
/* ===== 포디움 Top-3 랭킹 ===== */
.podium{display:flex;justify-content:center;align-items:flex-end;gap:10px;margin:8px 0 20px}
.pod{flex:1;max-width:168px;background:#fbfcfe;border:1px solid var(--line);border-radius:16px;padding:14px 8px 0;text-align:center;position:relative;transition:.18s;animation:fadeUp .35s ease both}
.pod:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.pod .pmedal{position:absolute;top:-13px;left:50%;transform:translateX(-50%);font-size:24px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.18))}
.pod .pavatar{width:52px;height:52px;border-radius:50%;background:#eaf6fd;display:grid;place-items:center;font-size:27px;margin:6px auto 8px;box-shadow:inset 0 0 0 1px rgba(13,27,58,.06)}
.pod .pname{font-weight:800;font-size:13.5px;color:#14264a;letter-spacing:-.02em;line-height:1.2;word-break:keep-all}
.pod .psub{font-size:11px;color:var(--mut);margin-top:2px;line-height:1.25}
.pod .pscore{font-weight:800;color:var(--navy);margin:6px 0 10px;font-size:15px}
.pod .pbase{display:grid;place-items:center;font-weight:900;border-radius:11px 11px 0 0;font-size:15px;color:#fff}
.pod.p1{order:2;background:linear-gradient(180deg,#fffdf4,#fff5d4);border-color:#f0d98c;transform:translateY(-10px)}
.pod.p1 .pavatar{width:62px;height:62px;font-size:33px}
.pod.p1 .pname{font-size:14.5px}
.pod.p1 .pbase{height:60px;background:linear-gradient(135deg,#f7c14a,#e0921a);color:#5a3d00}
.pod.p2{order:1}.pod.p2 .pbase{height:44px;background:linear-gradient(135deg,#c8d2e0,#9aa8bd);color:#3a4659}
.pod.p3{order:3}.pod.p3 .pbase{height:32px;background:linear-gradient(135deg,#e7c2a6,#c98a5f);color:#5a2f12}
.pod .tag{margin-left:3px}
@media(max-width:520px){.podium{gap:6px}.pod{padding-top:12px}.pod .pname{font-size:12px}.pod.p1 .pname{font-size:12.5px}.pod .pavatar{width:44px;height:44px;font-size:22px}.pod.p1 .pavatar{width:52px;height:52px;font-size:27px}.pod .psub{font-size:10px}}
/* ===== 접근성·디테일 감리 (frontend-design + web-interface-guidelines) ===== */
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button:focus-visible,a:focus-visible,[tabindex]:focus-visible{outline:2.5px solid var(--sky);outline-offset:2px}
.tside button:focus-visible,nav.tabs button:focus-visible,.seg button:focus-visible{outline-offset:3px;border-radius:11px}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--sky);outline-offset:1px}
.badge-pt,.stat .n,.pod .pscore,.rank-no,.season .dday{font-variant-numeric:tabular-nums}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  .floaty{display:none}
  .pod.p1{transform:none}.pod.p2,.pod.p3{transform:none}
}
/* ===== 책 발견 가로 캐러셀 (독서로 벤치마크) ===== */
.bookrow{display:flex;gap:14px;overflow-x:auto;padding:8px 2px 12px;scroll-snap-type:x proximity}
.bookcell{text-align:center;cursor:pointer;flex:none;width:96px;scroll-snap-align:start;transition:transform .15s}
.bookcell:hover{transform:translateY(-4px)}
.bktitle{font-size:11px;font-weight:700;margin-top:6px;line-height:1.22;color:#14264a;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bkauthor{font-size:10px;color:var(--mut);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shelf-h{font-weight:800;font-size:14.5px;color:#14264a;letter-spacing:-.02em}
.title-chip{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:800;color:#6d28d9;background:#f3e8ff;border:1px solid #ddd0f7;letter-spacing:-.01em}
.loanrank{position:absolute;left:-7px;top:-7px;width:25px;height:25px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;font-weight:900;font-size:12px;display:grid;place-items:center;box-shadow:0 3px 8px rgba(15,29,61,.28);font-variant-numeric:tabular-nums}
.bookrow .bookcell:nth-child(1) .loanrank{background:linear-gradient(135deg,#f7c14a,#e0921a);color:#4a3000}
.bookrow .bookcell:nth-child(2) .loanrank{background:linear-gradient(135deg,#cdd6e2,#9aa8bd);color:#2a3344}
.bookrow .bookcell:nth-child(3) .loanrank{background:linear-gradient(135deg,#e7c2a6,#c98a5f);color:#4a2a12}
/* ===== 명예의 전당 히어로 (정보이음 벤치마크) ===== */
.hall-hero{background:linear-gradient(125deg,#6d28d9,#4338ca 55%,#2563eb);color:#fff;border-radius:20px;padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 12px 30px rgba(76,29,149,.28)}
.hall-hero .hh-glow{position:absolute;right:-30px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,255,255,.35),transparent 70%);pointer-events:none}
.hh-live{font-size:10.5px;font-weight:800;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:999px;letter-spacing:.04em}
.hh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.hh-stat{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:12px 10px;text-align:center}
.hh-n{font-size:23px;font-weight:900;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.hh-l{font-size:11px;opacity:.93;margin-top:2px;line-height:1.25}
@media(max-width:520px){.hh-stats{grid-template-columns:1fr;gap:8px}.hh-stat{text-align:left;display:flex;align-items:baseline;gap:8px}}
/* ===== 성장형 stat 카드 (frontend-design 차별화) ===== */
.gstat{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;overflow:hidden;transition:.15s}
.gstat:hover{transform:translateY(-2px);border-color:var(--sky)}
.gstat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--gc,var(--sky))}
.gstat .gtop{display:flex;align-items:center;gap:8px}

/* ===== AI 첨삭 모듈(교체 지점) — 5축 성취수준 루브릭 휴리스틱 =====
   실서비스: 서버측 LLM이 동일 루브릭(5축)으로 점수+피드백 JSON 반환(03_API연동 참조). */
const RUBRIC_LABELS={content:'내용 이해',emotion:'감상 표현',life:'삶과 연결',structure:'구성·근거',spelling:'맞춤법'};
const RUBRIC_STD={content:'6국05-03',emotion:'6국03-03',life:'6국05-06',structure:'6국03-05',spelling:'6국04-06'};
/* 교사 설정 가중치로 성취수준 산정 (가중 평균) — 5축 중앙화 */
function emphasisNote(){const c=db&&db.rubricCfg;return (c&&c.emphasis)?` <span class="tag" style="background:#f3e8ff;color:#6d28d9">⭐ 이번 주 강조: ${c.label}</span>`:'';}
function calcLevel(R){const w=(db&&db.rubricCfg&&db.rubricCfg.weights)||{content:1,emotion:1,life:1,structure:1,spelling:1};
  let sw=0,sv=0;['content','emotion','life','structure','spelling'].forEach(k=>{const wk=w[k]||1;sv+=(R[k]||0)*wk;sw+=wk;});
  const avg=sw?sv/sw:0;return {avg:Math.round(avg*10)/10,level:avg>=4?'A':avg>=2.8?'B':'C'};}
function aiReview(text, mode){
  mode=mode||(me()&&me().mode)||'normal'; const easy=mode==='easy';
  const t=(text||'').trim();const len=t.replace(/\s/g,'').length;
  const sentences=t.split(/[.!?。\n]/).filter(s=>s.trim().length>2).length;
  const has=a=>a.some(k=>t.includes(k));const cnt=a=>a.reduce((n,k)=>n+(t.split(k).length-1),0);
  const hasFeeling=has(['느꼈','느낀','느낌','좋았','싫었','슬펐','재미','감동','놀랐','신기','뭉클','뿌듯','기뻤','무서','화났','속상','감사','소중','대단','멋지','부러','뭉클']);
  const hasLife=has(['나도','앞으로','다짐','실천','내 경험','경험이','비슷한','나라면','반성','깨달','우리 가족','내 생활','느낀 점','배웠']);  // 주어 '나는/내가'는 제외(삶 연결 오인 방지)
  const hasReason=has(['왜냐하면','때문','까닭','그래서','이유','덕분']);
  const hasPlot=has(['주인공','인물','이야기','내용','줄거리','등장','사건','장면','일어','벌어','했다','된다','되었','나온다']);
  const clamp=v=>Math.max(1,Math.min(5,Math.round(v)));const tiny=len<25;
  const R={
    content: tiny?1:clamp((len>=120?3:len>=70?2:len>=40?1:0)+(hasPlot?1:0)+(sentences>=3?1:0)),
    emotion: tiny?1:clamp((hasFeeling?2:0)+Math.min(2,cnt(['느꼈','느낀','감동','재미','놀','슬','기뻤','뭉클','소중','감사']))),
    life: tiny?1:clamp((hasLife?2:0)+(has(['앞으로','다짐','나라면','깨달','반성'])?1:0)),
    structure: tiny?1:clamp((hasReason?2:0)+(sentences>=4?2:sentences>=2?1:0)),
    spelling: clamp(4-(len<30?1:0)-Math.min(3,spellCheck(t).length))
  };
  const cl=calcLevel(R);const avg=cl.avg,level=cl.level;
  const pts=level==='A'?30:level==='B'?20:10;
  const praise=[];
  if(R.content>=4)praise.push(easy?'책 내용을 잘 적었어요!':'책의 내용을 구체적으로 잘 떠올려 적었어요.');
  if(R.emotion>=4)praise.push(easy?'느낌을 잘 썼어요!':'읽고 느낀 점을 생생하게 표현했어요.');
  if(R.life>=4)praise.push(easy?'내 이야기랑 잘 연결했어요!':'책을 자신의 삶과 연결한 점이 훌륭해요. [6국05-06]');
  if(!praise.length)praise.push(easy?'독후감을 쓴 게 멋져요!':'독후감 쓰기에 도전한 것 자체가 멋져요!');
  const fix=[];
  if(R.content<3)fix.push(easy?'어떤 이야기였는지 한 줄 더 써요.':'책에서 어떤 일이 있었는지(인물·사건) 한 문장 더 적어볼까요? [6국05-03]');
  if(R.structure<3)fix.push(easy?'"왜냐하면"을 넣어봐요.':'"왜냐하면 ~"처럼 까닭을 덧붙이면 글이 단단해져요.');
  if(R.spelling<3)fix.push(easy?'천천히 또박또박 써요.':'맞춤법·띄어쓰기를 한 번 더 살펴보면 좋아요. [6국04-06]');
  if(!fix.length)fix.push(easy?'더 길게 써도 좋아요.':'문장을 조금 더 다듬으면 한층 매끄러워져요.');
  const grow=[];
  if(R.life<4)grow.push(easy?'"나도 ~한 적 있다"를 써봐요.':'이 책이 내 생활·경험과 어떻게 연결되는지 한 문장 더 써볼까요? (예: "나도 ~한 적이 있다") [6국05-06]');
  else grow.push(easy?'"앞으로 나는 ~"을 적어요.':'연결한 경험에서 "앞으로 나는 ~" 다짐까지 적으면 글이 더 깊어져요.');
  if(R.emotion>=3)grow.push(easy?'왜 그렇게 느꼈는지 써요.':'느낌이 든 까닭을 작품의 한 부분과 연결지어 설명해 보세요. [6국05-04]');
  grow.push(easy?'기억나는 장면을 더 써요.':'인상 깊은 장면을 하나 골라 더 깊게 파고들면 글이 빛나요.');
  return{level,pts,rubric:R,avg:Math.round(avg*10)/10,
    praise:praise.slice(0,2),fix:fix.slice(0,2),grow:grow.slice(0,2),
    next:level==='A'?'아주 훌륭한 독후감이에요! 친구들과 공유해 볼까요?':level==='B'?'조금만 더하면 최고 수준! "발전"을 반영해 고쳐 써봐요.':'좋은 출발이에요. "발전"을 채워가며 다시 써봐요.'};
}

function aStats(){const u=me();const code=u.schoolCode;
  const studs=schoolStudents(code);const reps=schoolReports(code);
  const wrote=new Set(reps.map(r=>r.accId));const partic=studs.length?Math.round(wrote.size/studs.length*100):0;
  const lvA=reps.filter(r=>r.level==='A').length,tot=reps.length||1;
  const AX=['content','emotion','life','structure','spelling'];
  const grades=[...new Set(studs.map(s=>s.grade))].sort((x,y)=>x-y);
  const gradeRows=grades.map(g=>{const gr=reps.filter(r=>r.grade===g&&r.rubric);
    const row={g,n:studs.filter(s=>s.grade===g).length,cnt:gr.length};
    AX.forEach(k=>{row[k]=gr.length?Math.round(gr.reduce((s,r)=>s+(r.rubric[k]||0),0)/gr.length*10)/10:'-';});return row;});
  const clsMap={};studs.forEach(s=>{const key=s.grade+'-'+s.classNo;if(!clsMap[key])clsMap[key]={key,n:0,reps:0,pts:0};clsMap[key].n++;clsMap[key].pts+=s.points;});
  reps.forEach(r=>{const key=r.grade+'-'+r.classNo;if(clsMap[key])clsMap[key].reps++;});
  const clsRows=Object.values(clsMap).sort((a,b)=>a.key.localeCompare(b.key));
  // 학교 전체 최저 축(보강 포인트)

function josa(w,withJong,withoutJong){if(!w)return withoutJong;const c=w.charCodeAt(w.length-1);if(c<0xAC00||c>0xD7A3)return withoutJong;return (c-0xAC00)%28!==0?withJong:withoutJong;}
function neisSummary(id){const rs=accReports(id);
  if(!rs.length)return {books:'(기록된 독서활동 없음)',text:'아직 작성한 독후감이 없습니다.'};
  const titles=rs.map(r=>{const t=(r.book||'').replace(/[「」]/g,'').trim();const bk=BOOKS.find(b=>t.includes(b.t));return bk?`「${bk.t}」(${bk.a})`:`「${t}」`;});
  const uniq=[...new Set(titles)];
  const avgs=rs.map(r=>r.avg!=null?r.avg:({A:4.3,B:3,C:1.8}[r.level]||2.5));
  const mean=avgs.reduce((s,v)=>s+v,0)/avgs.length;const lvl=mean>=4?'매우 우수':mean>=2.8?'양호':'보통';
  const AX={content:'인물·사건·배경을 깊이 있게 파악하는 능력',emotion:'책에 대한 감상을 풍부하게 표현하는 능력',life:'작품을 자신의 삶과 연관 지어 성찰하는 태도',structure:'생각을 짜임새 있게 구성하는 능력',spelling:'바른 표기로 글을 다듬는 태도'};
  const acc={};Object.keys(AX).forEach(k=>acc[k]=0);let n=0;rs.forEach(r=>{if(r.rubric){Object.keys(AX).forEach(k=>acc[k]+=r.rubric[k]||0);n++;}});
  const best=n?Object.keys(AX).reduce((x,y)=>acc[x]>=acc[y]?x:y):'life';
  const improved=rs.some(r=>r.improvement>0);
  const text=`한 학기 동안 ${uniq.length}권의 책을 읽고 독후감 ${rs.length}편을 꾸준히 작성함. 특히 ${AX[best]}${josa(AX[best],'이','가')} 돋보이며, 작품을 깊이 있게 이해하고 자신의 생각으로 표현하는 능력이 ${lvl}함.${improved?' AI 첨삭을 바탕으로 자신의 글을 스스로 고쳐 쓰며 발전시키는 자기주도적 학습 태도가 두드러짐.':''}`;
  return {books:uniq.join(', '),text};}
function neisCard(id){const s=neisSummary(id);const a=db.accounts.find(x=>x.id===id);
  const full=`[독서활동상황] ${a?a.name:''}\n${s.books}\n\n${s.text}`;
  return `<div class="note" style="background:#f0fdf4;border-color:var(--mint)">✅ <b>${a?a.name:''}</b> 학생의 독서활동 요약을 생성했어요. 검토·수정 후 NEIS에 붙여넣으세요.</div>

  <div class="seg"><button class="${shareTab==='board'?'on':''}" onclick="shareGo('board')">📖 우수작 게시판</button><button class="${shareTab==='forum'?'on':''}" onclick="shareGo('forum')">🗣️ 독서 토론방</button></div>
  <div id="shareBody">${shareBody()}</div></div>`;}
function shareGo(k){shareTab=k;forumOpen=null;$('#shareBody').innerHTML=shareBody();}
function shareBody(){return shareTab==='board'?boardBody():forumBody();}
function boardBody(){const u=me();const shared=classmates(u).flatMap(s=>accReports(s.id).filter(r=>r.shared).map(r=>({r,a:s})));
  shared.sort((x,y)=>(y.r.cheers||0)-(x.r.cheers||0));
  return `<div class="sub">친구가 공유한 독후감을 읽고 👏 응원하고, <b>마음에 드는 문장에 스티커</b>로 동료 평가를 남겨요. (성취기준 [6국03-06]·[6국05-04])</div>
   ${shared.length?shared.map(({r,a})=>`<div class="card" style="background:#fbfcfe;margin-bottom:10px;box-shadow:none">
     <div class="row"><div class="avatar" style="width:34px;height:34px;font-size:17px">${a.avatar}</div>
      <div style="flex:1"><b>${a.name}</b> <span class="pill ${r.level}" style="font-size:11px">${r.level}</span> · ${r.book}</div>
      <button class="btn ${(r.cheeredBy||[]).includes(u.id)?'mut':'out'} sm" onclick="cheerReport('${r.id}')">👏 응원 ${r.cheers||0}</button></div>
     <div style="white-space:pre-wrap;margin-top:8px;font-size:14px;color:#374151;line-height:1.95">${boardSentences(r)}</div>
     <div class="muted" style="font-size:11.5px;margin-top:6px">💬 마음에 드는 문장을 눌러 친구에게 스티커를 남겨요!</div></div>`).join(''):'<div class="empty">아직 공유된 글이 없어요. 내 서재에서 멋진 글을 🌟공유해 보세요!</div>'}`;}
const STICKERS=[['👍','멋진 표현'],['💗','공감해요'],['✨','새로워요'],['🙋','나도 그래요']];
let stickOpen=null;
function splitSentences(t){const out=[];const re=/[^.!?。\n]+[.!?。]*/g;let m;while((m=re.exec(t||''))){const s=m[0].trim();if(s)out.push(s);}return out;}
function boardSentences(r){const sents=splitSentences(r.body);if(!sents.length)return dEsc(r.body||'');
  return sents.map((s,i)=>{const st=(r.stickers&&r.stickers[i])||[];const open=stickOpen&&stickOpen.rid===r.id&&stickOpen.i===i;
    return `<span class="psent ${st.length?'hasst':''}" onclick="toggleStick('${r.id}',${i})">${dEsc(s)}${st.length?' <span class="stchips">'+st.map(x=>x.e).join('')+(st.length>1?' '+st.length:'')+'</span>':''}</span>${open?stickPicker(r.id,i):''} `;}).join('');}
function stickPicker(rid,i){return `<span class="stickpick">${STICKERS.map(s=>`<button class="stickbtn" onclick="event.stopPropagation();addStick('${rid}',${i},'${s[0]}','${s[1]}')" title="${s[1]}">${s[0]}</button>`).join('')}</span>`;}
function toggleStick(rid,i){stickOpen=(stickOpen&&stickOpen.rid===rid&&stickOpen.i===i)?null:{rid,i};const b=$('#shareBody');if(b)b.innerHTML=shareBody();}
function addStick(rid,i,e,label){const u=me();const r=db.reports.find(x=>x.id===rid);if(!r)return;if(!r.stickers)r.stickers={};if(!r.stickers[i])r.stickers[i]=[];
  if(r.stickers[i].some(x=>x.by===u.id&&x.e===e)){toast('이미 같은 스티커를 남겼어요');return;}
  r.stickers[i].push({e,label,by:u.id,byName:u.name});const author=db.accounts.find(a=>a.id===r.accId);if(author&&author.id!==u.id)author.points+=1;
  stickOpen=null;save();toast(`'${label}' 스티커를 남겼어요 ${e}`);const b=$('#shareBody');if(b)b.innerHTML=shareBody();}
function forumBody(){const u=me();
  if(forumOpen){const tp=db.topics.find(t=>t.id===forumOpen);if(!tp)return boardBody();
    return `<button class="btn out sm" onclick="shareGo('forum')">← 토론 목록</button>
     <div class="card" style="background:#f5f3ff;box-shadow:none;margin-top:10px"><div style="font-weight:800">🗣️ ${dEsc(tp.title)}</div>${tp.book?`<div class="muted">관련 책: ${dEsc(tp.book)}</div>`:''}</div>
     ${tp.posts.map(p=>`<div class="list-item" style="align-items:flex-start"><div class="avatar">${p.avatar}</div>
       <div style="flex:1"><div style="font-weight:700">${dEsc(p.name)}</div><div style="font-size:14px;color:#374151">${dEsc(p.text)}</div></div>
       <button class="btn ${(p.likedBy||[]).includes(u.id)?'mut':'out'} sm" onclick="likePost('${tp.id}','${p.id}')">👍 ${p.likes||0}</button></div>`).join('')}
     <div class="card" style="box-shadow:none"><textarea id="forumInput" placeholder="내 생각을 예의 바르게 남겨요"></textarea>
       <div style="text-align:right;margin-top:8px"><button class="btn" onclick="addPost('${tp.id}')">💬 의견 남기기 (+2P)</button></div></div>`;}
  return `<div class="sub">관심 있는 주제를 눌러 토론에 참여해요. (성취기준 [6국05-04]·[6국03-06])</div>
   ${db.topics.map(t=>`<div class="list-item" onclick="openTopic('${t.id}')" style="cursor:pointer"><div class="avatar">🗣️</div>
     <div style="flex:1"><div style="font-weight:700">${dEsc(t.title)}</div><div class="muted">${t.book?dEsc(t.book)+' · ':''}의견 ${t.posts.length}개</div></div>
     <span class="tag">참여 →</span></div>`).join('')}`;}
function openTopic(id){forumOpen=id;$('#shareBody').innerHTML=forumBody();}
function addPost(tid){const u=me();const t=($('#forumInput').value||'').trim();if(t.length<2){toast('의견을 입력해요');return;}
  const tp=db.topics.find(x=>x.id===tid);if(!tp)return;tp.posts.push({id:'p'+Date.now(),name:u.name,avatar:u.avatar,text:t,likes:0,likedBy:[]});u.points+=2;save();toast('의견 등록! +2P 🗣️');$('#shareBody').innerHTML=forumBody();}
function likePost(tid,pid){const u=me();const top=db.topics.find(x=>x.id===tid);if(!top)return;const p=top.posts.find(x=>x.id===pid);if(!p)return;if(!p.likedBy)p.likedBy=[];if(p.likedBy.includes(u.id)){toast('이미 좋아요 했어요');return;}p.likedBy.push(u.id);p.likes=(p.likes||0)+1;save();$('#shareBody').innerHTML=forumBody();}
function shareReport(id){const r=db.reports.find(x=>x.id===id);r.shared=!r.shared;save();toast(r.shared?'우수작 게시판에 공유했어요 🌟':'공유를 취소했어요');mountStudent();}
function cheerReport(id){const u=me();const r=db.reports.find(x=>x.id===id);if(!r.cheeredBy)r.cheeredBy=[];if(r.cheeredBy.includes(u.id)){toast('이미 응원했어요 🙂');return;}r.cheeredBy.push(u.id);r.cheers=(r.cheers||0)+1;const author=db.accounts.find(a=>a.id===r.accId);if(author&&author.id!==u.id)author.points+=2;save();toast('👏 응원을 보냈어요! 작성자에게 +2P');mountStudent();}

function vote(i,c){const u=me();if(!db.balance)db.balance={};if(!db.balance[i])db.balance[i]={a:0,b:0};db.balance[i][c]++;if(!u.balanceVoted)u.balanceVoted=[];u.balanceVoted.push(i);u.points+=2;save();toast('투표 완료! +2P');gameRefresh();}

function whoamiSetup(){const cur=WHOAMI[who.round];if(!cur)return;const others=BOOKS.map(b=>b.t).filter(t=>t!==cur.title).sort(()=>Math.random()-.5).slice(0,3);who.opts=[cur.title,...others].sort(()=>Math.random()-.5);}

function countBingoLines(a){let n=0;for(let r=0;r<5;r++)if([0,1,2,3,4].every(c=>a[r*5+c]))n++;for(let c=0;c<5;c++)if([0,1,2,3,4].every(r=>a[r*5+c]))n++;if([0,1,2,3,4].every(i=>a[i*5+i]))n++;if([0,1,2,3,4].every(i=>a[i*5+(4-i)]))n++;return n;}

function battleStart(){clearInterval(battleTimer);const qs=[...BATTLE_Q].sort(()=>Math.random()-.5).slice(0,5);

function compressImage(file,maxW,q){return new Promise((resolve,reject)=>{const url=URL.createObjectURL(file);const img=new Image();
  img.onload=()=>{const sc=Math.min(1,maxW/(img.width||maxW));const w=Math.max(1,Math.round(img.width*sc)),h=Math.max(1,Math.round(img.height*sc));

    try{resolve(cv.toDataURL('image/jpeg',q||0.6));}catch(e){reject(e);}};
  img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('이미지를 열 수 없어요'));};img.src=url;});}
/* Tesseract 전처리 — 업스케일+그레이스케일+대비 정규화로 인식률↑(키 없는 폴백 경로 개선).
   ※하드 이진화는 그림자/조명 불균일 사진에서 역효과라 일부러 안 함(Tesseract 내부 Otsu에 맡김). */
function preprocessForOCR(file){return new Promise((resolve,reject)=>{
  const url=URL.createObjectURL(file);const img=new Image();
  img.onload=()=>{URL.revokeObjectURL(url);
    let w=img.width||1,h=img.height||1;let sc=1600/w;if(sc<1)sc=1;if(w*sc>2400)sc=2400/w; // 작은 글씨 업스케일(상한 2400)
    w=Math.max(1,Math.round(w*sc));h=Math.max(1,Math.round(h*sc));
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;const ctx=cv.getContext('2d');
    ctx.drawImage(img,0,0,w,h);const id=ctx.getImageData(0,0,w,h);const p=id.data;const n=w*h;
    const hist=new Array(256).fill(0);const gray=new Uint8ClampedArray(n);
    for(let i=0,j=0;i<p.length;i+=4,j++){const g=(p[i]*0.299+p[i+1]*0.587+p[i+2]*0.114)|0;gray[j]=g;hist[g]++;}
    const clip=Math.max(1,Math.round(n*0.01));let lo=0,hi=255,acc=0; // 1%/99% 백분위로 강건한 대비 스트레치
    for(let t=0;t<256;t++){acc+=hist[t];if(acc>clip){lo=t;break;}}
    acc=0;for(let t=255;t>=0;t--){acc+=hist[t];if(acc>clip){hi=t;break;}}
    const range=Math.max(1,hi-lo);
    for(let i=0,j=0;i<p.length;i+=4,j++){let v=(gray[j]-lo)*255/range;v=v<0?0:v>255?255:v;p[i]=p[i+1]=p[i+2]=v;p[i+3]=255;}
    ctx.putImageData(id,0,0);resolve(cv);};
  img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('이미지 열기 실패'));};img.src=url;});}
/* 제미나이 비전 OCR — 멀티모달로 손글씨를 직접 읽음(한국어 정확도↑). AI 미설정 시 Tesseract 폴백 */
const OCR_PROMPT='다음은 초등학생이 손으로 쓴 독후감 사진입니다. 사진 속 글씨를 한국어 그대로 정확히 옮겨 적어 주세요. 맞춤법이 틀렸어도 임의로 고치지 말고 학생이 쓴 그대로, 줄바꿈은 유지하고, 설명·따옴표·머리말 없이 본문 텍스트만 출력하세요. 글씨를 전혀 읽을 수 없으면 빈 줄로 두세요.';

  return ((((d.candidates||[])[0]||{}).content||{}).parts||[]).map(p=>p.text||'').join('').trim();}

        :`<div class="note" style="margin-top:12px;background:#fffbeb;border-color:var(--amber)">사진 속 글씨를 잘 읽지 못했어요. <b>또박또박·밝은 사진</b>으로 다시 찍거나 아래에서 직접 입력해요.</div>`)+editorOCR(dataUrl||'');

  try{
    const pre=await preprocessForOCR(f).catch(()=>null); // 전처리 실패 시 원본으로
    const {data}=await Tesseract.recognize(pre||f,'kor');
    const text=(data.text||'').replace(/[ \t]+/g,' ').replace(/\n{2,}/g,'\n').trim();
    draft.book='';draft.body=text;
    const conf=Math.round(data.confidence||0);
    const warn=conf<50?`<div class="note" style="margin-top:12px;background:#fef2f2;border-color:var(--rose)">⚠️ 신뢰도 ${conf}%로 낮아요. 흘려 쓴 손글씨는 브라우저 OCR이 약해요. <b>또박또박·원고지</b>로 다시 찍거나 아래에서 직접 고쳐 쓰세요.</div>`
      :`<div class="note" style="margin-top:12px">✅ 인식 완료 · 신뢰도 ${conf}%. <b>왼쪽 원본과 대조하며</b> 잘못 읽은 글자를 고친 뒤 첨삭받아요.</div>`;
    box.innerHTML=gErrNote+warn+editorOCR(dataUrl||URL.createObjectURL(f));
  }catch(e){box.innerHTML=gErrNote+`<div class="note" style="margin-top:12px;background:#fef2f2;border-color:var(--rose)">인식에 실패했어요 (${e.message}). 더 밝고 또렷한 사진으로 다시 시도하거나 예시를 써보세요.</div>`;}

let ocrZoom=2.5;
function ocrMag(e,img){const lens=document.getElementById('ocrLens');if(!lens||!img)return;
  if(e.cancelable)e.preventDefault();const r=img.getBoundingClientRect();
  const px=e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX, py=e.touches&&e.touches[0]?e.touches[0].clientY:e.clientY;
  const cx=px-r.left, cy=py-r.top;
  if(cx<0||cy<0||cx>r.width||cy>r.height){ocrMagHide();return;}
  const lw=lens.offsetWidth||150, lh=lens.offsetHeight||150;
  lens.style.display='block';
  lens.style.left=Math.max(-lw/3,Math.min(r.width-lw*2/3,cx-lw/2))+'px';
  lens.style.top=(cy-lh/2)+'px';
  lens.style.backgroundImage='url("'+img.src+'")';
  lens.style.backgroundSize=(r.width*ocrZoom)+'px '+(r.height*ocrZoom)+'px';
  lens.style.backgroundPosition=(-(cx*ocrZoom-lw/2))+'px '+(-(cy*ocrZoom-lh/2))+'px';}

  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{audioChunks=[];try{mediaRec=new MediaRecorder(stream);}catch(e){toast('녹음을 시작할 수 없어요');stream.getTracks().forEach(t=>t.stop());return;}
    mediaRec.ondataavailable=e=>{if(e.data&&e.data.size)audioChunks.push(e.data);};
    mediaRec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(audioChunks,{type:(mediaRec&&mediaRec.mimeType)||'audio/webm'});const fr=new FileReader();fr.onload=()=>{draft.audio=fr.result;renderAttach();toast('낭독 녹음 완료 🎤');};fr.readAsDataURL(blob);};

/* ── 책 표지 실사 로딩 (카카오/네이버 API, MutationObserver 자동감지) ── */
const _cvCache=(()=>{try{return JSON.parse(localStorage.getItem('_bkc')||'{}');}catch(e){return {};}})();
function _cvSave(){const keys=Object.keys(_cvCache);if(keys.length>100){keys.slice(0,keys.length-100).forEach(k=>delete _cvCache[k]);}try{localStorage.setItem('_bkc',JSON.stringify(_cvCache));}catch(e){try{localStorage.removeItem('_bkc');}catch(_){}}}
async function loadCovers(root){
  root=root||document;
  const els=[...root.querySelectorAll('[data-ct]:not([data-cv-done])')];
  if(!els.length)return;
  const titles=[...new Set(els.map(e=>e.dataset.ct).filter(t=>!(t in _cvCache)))];
  // 한 번에 4개씩 병렬 요청
  for(let i=0;i<titles.length;i+=4){
    await Promise.all(titles.slice(i,i+4).map(async t=>{
      try{const r=await fetch(`/.netlify/functions/booksearch?q=${encodeURIComponent(t)}&size=1`);
        const j=await r.json();_cvCache[t]=(j.books&&j.books[0]&&j.books[0].thumbnail)||'';}
      catch(e){_cvCache[t]='';}
    }));
  }
  _cvSave();
  els.forEach(el=>{
    el.dataset.cvDone='1';
    const url=_cvCache[el.dataset.ct];
    if(!url)return;
    const big=el.dataset.cbig==='1';const w=big?94:64,h=big?126:86;
    const img=document.createElement('img');
    img.src=url;
    img.style.cssText=`width:${w}px;height:${h}px;border-radius:8px;box-shadow:var(--shadow);object-fit:cover;flex:none;display:block;opacity:0;transition:opacity .25s`;
    img.onerror=()=>{};
    img.onload=()=>{el.replaceWith(img);requestAnimationFrame(()=>{img.style.opacity='1';});};
  });
}
let _cvTimer=null;
new MutationObserver(()=>{clearTimeout(_cvTimer);_cvTimer=setTimeout(()=>loadCovers(),300);})
  .observe(document.body,{childList:true,subtree:true});

const SPELL_RULES=[[/([가-힣])띠(?=[\s.!?]|$)/,'$1다'],[/([가-힣])따(?=[\s.!?]|$)/,'$1다'],[/([가-힣])당(?=[\s.!?]|$)/,'$1다'],[/슴니다/,'습니다'],[/임니다/,'입니다'],[/함니다/,'합니다'],[/했슴(?=[\s.!?]|$)/,'했음'],[/되써|돼써/,'됐어'],[/같애/,'같아']];
function spellCheck(text){const t=text||'';const f=[];const seen={};
  SPELL.forEach(([w,r])=>{if(t.includes(w)&&!seen[w]){seen[w]=1;f.push({w,r});}});
  SPELL_RULES.forEach(([re,rep])=>{const m=t.match(re);if(m){const w=m[0],r=w.replace(re,rep);if(w!==r&&!seen[w]){seen[w]=1;f.push({w,r});}}});

  if(/ {2,}/.test(t))f.push({w:'  ',r:' ',label:'이중 공백'});
  const rep=t.match(/([가-힣A-Za-z])\1{3,}/);if(rep)f.push({w:rep[0],r:rep[1],label:'같은 글자 반복'});

   배포 환경에 함수가 없으면(file://·GitHub Pages 등) 404→catch→내장 사전으로 자동 폴백. */
async function spellCheckProxy(text){
  if(!AI_CONFIG.spellUrl)throw new Error('no spell endpoint');
  const res=await fetch(AI_CONFIG.spellUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  if(!res.ok)throw new Error('spell '+res.status);
  const d=await res.json();const typos=d.typos||[];const seen={};const f=[];
  typos.forEach(t=>{const w=t.token,r=t.suggestion;
    if(!w||!r||w===r||seen[w])return;seen[w]=1;
    const label=w.replace(/\s/g,'')===String(r).replace(/\s/g,'')?'띄어쓰기':'맞춤법';
    f.push({w,r,label});});

/* 표시용 통합 검사: 서버 검사기 결과(권위) + 내장 사전이 잡은 것(서버가 놓친 것만) 합침 */
async function spellCheckAsync(text){
  const local=spellCheck(text);
  if(AI_CONFIG.spellUrl){
    try{const remote=await spellCheckProxy(text);
      const seen={};remote.forEach(s=>seen[s.w]=1);
      local.forEach(s=>{if(!seen[s.w]&&!remote.some(rm=>String(rm.w).includes(s.w))){seen[s.w]=1;remote.push(s);}});
      return remote;
    }catch(e){return local;}
  }
  return local;}

/* ===== 고쳐쓰기 전·후 Diff (LCS 단어 단위, 과정중심평가 시각화) ===== */
function diffTokens(a,b){const A=(a||'').split(/(\s+)/),B=(b||'').split(/(\s+)/),m=A.length,n=B.length;
  const dp=[];for(let i=0;i<=m;i++)dp.push(new Int32Array(n+1));
  for(let i=m-1;i>=0;i--)for(let j=n-1;j>=0;j--)dp[i][j]=A[i]===B[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  let i=0,j=0,out=[];
  while(i<m&&j<n){if(A[i]===B[j]){out.push(['=',A[i]]);i++;j++;}else if(dp[i+1][j]>=dp[i][j+1]){out.push(['-',A[i]]);i++;}else{out.push(['+',B[j]]);j++;}}
  while(i<m)out.push(['-',A[i++]]);while(j<n)out.push(['+',B[j++]]);return out;}
function dEsc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function diffCard(r){if(!r||!r.revisionOf)return '';const prev=db.reports.find(x=>x.id===r.revisionOf);if(!prev)return '';

  const html=toks.map(p=>{const t=p[0],v=p[1];if(t==='=')return dEsc(v);if(t==='+'){if(v.trim())add++;return '<ins>'+dEsc(v)+'</ins>';}if(v.trim())del++;return '<del>'+dEsc(v)+'</del>';}).join('');
  const da=(prev.avg!=null&&r.avg!=null)?Math.round((r.avg-prev.avg)*10)/10:null;
  return `<div class="diffbox"><div class="diffhead">✏️ 고쳐쓰기 전·후 비교<span class="diffleg"><span class="ins">초록 = 추가</span> · <span class="del">빨강 = 삭제</span></span></div>
   <div class="diffbody">${html}</div>
   <div class="difffoot">＋추가 ${add}어절 · －삭제 ${del}어절${da!=null?` &nbsp;|&nbsp; 성취수준 평균 ${prev.avg} → ${r.avg} <b style="color:${da>0?'#15803d':'#b45309'}">${da>0?'+'+da+' ▲':'±'+da}</b>`:''}</div></div>`;}

function wizardStep(){const s=WIZARD[wz.step];return `<div class="card">

let shopCat='hair', tryItem=null;
function previewWear(u,t){const w=Object.assign({},wearOf(u));w[t.cat]=t.id;return w;}
const SLOT_IC={hair:'💇',hat:'🧢',top:'👕',bottom:'👖',shoes:'👟',acc:'🎒'};
function sShop(){const u=me();const w=wearOf(u);
  const pvWear=tryItem?previewWear(u,tryItem):w;
  const tInfo=tryItem?WARDROBE[tryItem.cat].find(x=>x.id===tryItem.id):null;
  const owned=tryItem?(u.items.includes(tryItem.id)||tInfo.cost===0):false;

  const ownedCount=(u.items||[]).length;
  return `<div class="card"><div class="row"><h2 style="flex:1">🧥 내 사물함 · 아바타 꾸미기</h2><span class="badge-pt" style="background:#eaf6fd;color:var(--navy);border:none">⭐ ${u.points}P</span></div>

   <div class="locker">
     <div class="locker-doll">
       <div class="dollbar"><span>📦 ${u.name}의 사물함</span><span class="muted" style="font-weight:600;font-size:11px">아이템 ${ownedCount}개</span></div>
       <div class="doll-stage">${charSVG(pvWear,140)}${tryItem?'<div class="tryflag">미리보기</div>':''}</div>
       ${tInfo?`<div class="tryinfo">
          <div style="font-weight:800;font-size:14.5px">${tInfo.n}</div>
          <div class="muted" style="margin:2px 0 8px">${owned?'보유 중인 아이템':'⭐ '+tInfo.cost+'P'}</div>
          ${owned?`<button class="btn block sm" onclick="equip('${tryItem.cat}','${tryItem.id}')">${worn?'✓ 착용 중':'착용하기'}</button>`
                 :`<button class="btn block sm" onclick="buy('${tryItem.cat}','${tryItem.id}',${tInfo.cost})">⭐${tInfo.cost}P 구매·착용</button>`}
          <button class="btn out block sm" style="margin-top:6px" onclick="tryClear()">미리보기 끄기</button>
        </div>`
        :`<div class="slotlist">${WARDROBE_CATS.map(([k,label])=>{const eq=WARDROBE[k].find(x=>x.id===w[k]);return `<div class="slot ${shopCat===k?'active':''}" onclick="shopGo('${k}')">
             <div class="sic">${SLOT_IC[k]}</div>
             <div style="flex:1;min-width:0"><div class="snm">${label}</div>${eq?`<div class="sval">${eq.n}</div>`:`<div class="sempty">착용 안 함</div>`}</div>
             <span class="muted" style="font-size:15px">›</span></div>`;}).join('')}
          <button class="btn out block sm" style="margin-top:4px" onclick="undressAll()">모자·소품 벗기</button></div>`}
     </div>
     <div class="locker-inv">
       <div class="seg">${WARDROBE_CATS.map(([k,label])=>`<button class="${shopCat===k?'on':''}" onclick="shopGo('${k}')">${label}</button>`).join('')}</div>
       <div class="invgrid">${WARDROBE[shopCat].map(it=>{const own=u.items.includes(it.id)||it.cost===0;const isWorn=w[shopCat]===it.id;const trying=tryItem&&tryItem.cat===shopCat&&tryItem.id===it.id;
         const prev=Object.assign({},w);prev[shopCat]=it.id;
         return `<div class="invcell ${isWorn?'worn':''} ${trying?'trying':''}" onclick="tryOn('${shopCat}','${it.id}')">
           ${isWorn?'<span class="ribbon w">착용중</span>':(own&&it.cost>0?'<span class="ribbon o">보유</span>':'')}
           <div style="display:flex;justify-content:center;height:78px;overflow:hidden">${charSVG(prev,56)}</div>
           <div class="nm">${it.n}</div>
           <div style="margin-top:1px">${own?'<span class="muted" style="font-size:11.5px">'+(it.cost===0?'기본':'보유')+'</span>':'<span class="price">⭐'+it.cost+'P</span>'}</div></div>`;}).join('')}</div>
     </div>
   </div></div>`;}
function shopGo(k){shopCat=k;tryItem=null;mountStudent();}
function tryOn(cat,id){tryItem={cat,id};mountStudent();}
function tryClear(){tryItem=null;mountStudent();}
function buy(cat,id,cost){const u=me();if(u.points<cost){toast('포인트가 부족해요. 독후감을 더 써볼까요? ✍️');return;}u.points-=cost;if(!u.items.includes(id))u.items.push(id);wearOf(u)[cat]=id;save();toast('구매·착용 완료! 🎉');mountStudent();}
function equip(cat,id){const u=me();const w=wearOf(u);if(cat==='hat'||cat==='acc')w[cat]=(w[cat]===id?'':id);else w[cat]=id;save();toast('착용!');mountStudent();}
function undressAll(){const u=me();const w=wearOf(u);w.hat='';w.acc='';tryItem=null;save();toast('모자·소품을 벗었어요');mountStudent();}

let rkTab='class';
function schoolRanks(){const m={};db.accounts.filter(a=>a.role==='student').forEach(a=>{if(!m[a.schoolCode])m[a.schoolCode]={code:a.schoolCode,name:a.schoolName,region:a.region,sum:0,n:0};m[a.schoolCode].sum+=a.points;m[a.schoolCode].n++;});
  return Object.values(m).map(s=>({...s,avg:Math.round(s.sum/s.n)})).sort((a,b)=>b.sum-a.sum);}
function rankView(){const u=me();
  return `<div class="card"><h2>🏆 랭킹 · 대회</h2>
   <div class="seg">
    <button class="${rkTab==='class'?'on':''}" onclick="rkGo('class')">우리 반</button>
    <button class="${rkTab==='school'?'on':''}" onclick="rkGo('school')">학교 내 학급</button>

   </div><div id="rkBody">${rankBody()}</div></div>`;}
function rkGo(k){rkTab=k;$('#rkBody').innerHTML=rankBody();}
function podium(top){const slot=(e,rank)=>{if(!e)return '';
   return `<div class="pod p${rank}"><div class="pmedal">${rank===1?'👑':['','🥇','🥈','🥉'][rank]}</div>
     <div class="pavatar">${e.avatar||'🧒'}</div>
     <div class="pname">${e.name}${e.me?' <span class="tag">나</span>':''}</div>
     <div class="psub">${e.sub||''}</div>
     <div class="pscore">${e.score}</div>
     <div class="pbase">${rank}</div></div>`;};
  return `<div class="podium">${slot(top[0],1)}${slot(top[1],2)}${slot(top[2],3)}</div>`;}
function hallHero(u){const cs=classmates(u);const total=cs.reduce((s,a)=>s+(a.points||0),0);
  const masters=cs.filter(a=>(a.lvl||lvlOf(a.points))>=6).length;
  const top=cs.slice().sort((a,b)=>(b.points||0)-(a.points||0))[0];
  return `<div class="hall-hero"><div class="hh-glow"></div><div style="position:relative;z-index:1">
    <div style="font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">🏛️ 우리 반 명예의 전당 <span class="hh-live">● LIVE</span></div>
    <div style="opacity:.92;font-size:13px;margin-top:3px">${u.schoolName} ${u.grade}-${u.classNo} · 함께 쌓은 독서 기록</div>
    <div class="hh-stats">
     <div class="hh-stat"><div class="hh-n">${total.toLocaleString()}<span style="font-size:13px;font-weight:700">pts</span></div><div class="hh-l">학급 전체 포인트</div></div>
     <div class="hh-stat"><div class="hh-n">${masters}<span style="font-size:13px;font-weight:700">명</span></div><div class="hh-l">👑 책갈피 마스터</div></div>
     <div class="hh-stat"><div class="hh-n">${top&&top.points?'⭐'+top.points:'-'}</div><div class="hh-l">🥇 현재 1위 ${top?top.name:'아직 없음'}</div></div>
    </div></div></div>`;}
function rankBody(){const u=me();
  if(rkTab==='class'){const cs=classmates(u).slice().sort((a,b)=>b.points-a.points);
    const top=cs.slice(0,3).map(a=>({avatar:a.avatar,name:a.name,sub:levelName(a.lvl),score:'⭐'+a.points,me:a.id===u.id}));
    return `<div class="sub">우리 반 ${u.schoolName} ${u.grade}-${u.classNo} · 성장 포인트 순</div>`+(cs.length?podium(top):'')+cs.slice(3).map((a,i)=>rowUser(a,i+3,u)).join('');}
  if(rkTab==='school'){const m={};schoolStudents(u.schoolCode).forEach(a=>{const k=a.grade+'-'+a.classNo;if(!m[k])m[k]={k,sum:0,n:0};m[k].sum+=a.points;m[k].n++;});
    const arr=Object.values(m).map(c=>({...c,avg:Math.round(c.sum/c.n)})).sort((a,b)=>b.avg-a.avg);const mine=u.grade+'-'+u.classNo;
    const top=arr.slice(0,3).map(c=>({avatar:'🏫',name:c.k+'반',sub:c.n+'명',score:'평균 ⭐'+c.avg,me:c.k===mine}));
    return `<div class="sub">${u.schoolName} 학급 대항 · <b>평균 포인트</b> 순(인원수 보정)</div>`+(arr.length?podium(top):'')+arr.slice(3).map((c,i)=>`<div class="list-item"><div class="rank-no">${i+4}</div>
      <div style="flex:1"><div style="font-weight:700">${c.k}반 ${c.k===mine?'<span class="tag">우리 반</span>':''}</div><div class="muted">${c.n}명</div></div>
      <div style="font-weight:800;color:var(--navy)">평균 ⭐${c.avg}</div></div>`).join('');}
  if(rkTab==='nation'){const arr=schoolRanks();const myi=arr.findIndex(s=>s.code===u.schoolCode);
    const top=arr.slice(0,3).map(s=>({avatar:'🏫',name:s.name,sub:s.region+' · '+s.n+'명',score:'⭐'+s.sum,me:s.code===u.schoolCode}));
    return `<div class="sub">전국 학교 대항 · 합계 포인트(데모: 시드 학교들)</div>
      ${myi>=0?`<div class="note" style="margin-bottom:10px">📣 우리 학교 <b>${u.schoolName}</b> — 전국 <b>${myi+1}위</b> / ${arr.length}개교 (평균 ⭐${arr[myi].avg})</div>`:''}
      ${arr.length?podium(top):''}
      ${arr.slice(3,12).map((s,i)=>`<div class="list-item"><div class="rank-no">${i+4}</div>
        <div class="avatar">🏫</div><div style="flex:1"><div style="font-weight:700">${s.name} ${s.code===u.schoolCode?'<span class="tag">우리 학교</span>':''}</div>
        <div class="muted">${s.region} · ${s.n}명</div></div><div style="font-weight:800;color:var(--navy)">⭐${s.sum}</div></div>`).join('')}`;}
  if(rkTab==='challenge'){const c=db.challenge;if(!c)return '<div class="empty">진행 중인 챌린지가 없어요.</div>';
    const m={};db.reports.filter(r=>r.challengeId===c.id).forEach(r=>{const a=db.accounts.find(x=>x.id===r.accId);if(!a)return;const sc=r.level==='A'?3:r.level==='B'?2:1;if(!m[a.id])m[a.id]={a,score:0,cnt:0};m[a.id].score+=sc;m[a.id].cnt++;});
    const arr=Object.values(m).sort((x,y)=>y.score-x.score);
    return `<div class="challenge" style="margin:0 0 14px"><b>🏅 ${c.title} — ${c.book}</b><div class="muted">이 책 독후감의 성취수준 점수 합 · ~${c.end}</div></div>
      ${arr.length?arr.map((e,i)=>`<div class="list-item"><div class="rank-no ${i<3?'r'+(i+1):''}">${i+1}</div><div class="avatar">${e.a.avatar||'🧒'}</div>
        <div style="flex:1"><div style="font-weight:700">${e.a.name} ${e.a.id===u.id?'<span class="tag">나</span>':''}</div><div class="muted">${e.a.schoolName} · ${e.cnt}편</div></div>
        <div style="font-weight:800;color:var(--navy)">${e.score}점</div></div>`).join(''):'<div class="empty">아직 챌린지 제출이 없어요. 1등에 도전!</div>'}
      <div style="text-align:center;margin-top:10px"><button class="btn warn" onclick="startChallenge()">🏅 챌린지 독후감 쓰기</button></div>`;}
  if(rkTab==='hall'){const shared=db.reports.filter(r=>r.shared).map(r=>({r,a:db.accounts.find(x=>x.id===r.accId)})).filter(x=>x.a);
    shared.sort((x,y)=>(y.r.cheers||0)-(x.r.cheers||0)||(y.r.avg||0)-(x.r.avg||0));const top=shared.slice(0,10);
    return hallHero(u)+`<div class="sub">전국에서 공유된 우수 독후감 명예의 전당 🏛️ — 많이 응원받은 글이 위로!</div>
     ${top.length?top.map(({r,a},i)=>`<div class="card" style="background:#fffdf5;box-shadow:none;margin-bottom:10px;border:1px solid ${i<3?'var(--amber)':'var(--line)'}">
       <div class="row"><div class="rank-no ${i<3?'r'+(i+1):''}">${i+1}</div><div class="avatar">${a.avatar}</div>
        <div style="flex:1"><div style="font-weight:700">${a.name} <span class="pill ${r.level}" style="font-size:11px">${r.level}</span> ${a.id===u.id?'<span class="tag">나</span>':''}</div><div class="muted">${a.schoolName} · ${r.book} · 👏${r.cheers||0}</div></div></div>
       <p style="font-size:13.5px;color:#374151;margin-top:8px;max-height:64px;overflow:hidden">${r.body}</p></div>`).join(''):'<div class="empty">아직 전당에 오른 작품이 없어요. 멋진 독후감을 🌟공유해 1등이 되어 보세요!</div>'}`;}
}
function rowUser(a,i,u){return `<div class="list-item"><div class="rank-no ${i<3?'r'+(i+1):''}">${i+1}</div><div class="avatar">${a.avatar}</div>

    <div class="gstat" style="--gc:var(--sky);--gtint:#e1f1fb"><div class="gtop"><div class="gic">🌳</div><div class="gl">A수준 비율</div></div><div class="gn">${Math.round(lvA/tot*100)}%</div><div class="gx">A ${lvA} · B ${lvB} · C ${lvC}</div></div></div>

   ${studs.length?studs.slice().sort((a,b)=>b.points-a.points).map(a=>{const rs=accReports(a.id);const last=rs[0];
     return `<div class="list-item"><div class="avatar">${a.avatar}</div><div style="flex:1"><div style="font-weight:700">${a.name} <span class="pill B" style="font-size:11px">${levelName(a.lvl)}</span></div>
     <div class="muted">독후감 ${rs.length}편 · 최근 ${last?last.date+' '+last.book:'없음'}</div></div>

     <div style="text-align:right"><div style="font-weight:800;color:var(--navy)">⭐${a.points}</div>${last?`<span class="pill ${last.level}" style="font-size:11px">최근 ${last.level}</span>`:''}</div></div>`;}).join(''):`<div class="empty">아직 학생이 없어요. '학급·학생 관리'에서 추가하거나, 학생이 회원가입하면 자동으로 들어와요.</div>`}</div>`;}
function tReview(){const u=me();const reps=classReports(u);const pend=reps.filter(r=>!r.reviewed).length;
  return `<div class="card"><h2>📝 독후감 검토 · 첨삭 확정</h2><div class="sub">AI 첨삭을 검토하고 확인 도장을 찍어요. (AI 초안 → 교사 수정·확정 = 업무경감)</div>
   ${pend?`<div class="row" style="margin-bottom:10px;gap:8px;flex-wrap:wrap"><button class="btn sm" onclick="tBatchApprove()">☑️ 선택 일괄 승인</button><button class="btn out sm" onclick="tCheckAll()">전체 선택</button><span class="muted">대기 글을 체크해 한 번에 승인 (${pend}건 대기)</span></div>`:''}
   ${reps.length?reps.map(r=>{const a=db.accounts.find(x=>x.id===r.accId);return `<div class="list-item">${!r.reviewed?`<input type="checkbox" class="revchk" value="${r.id}" style="width:auto;flex:none;margin:0">`:''}<span class="pill ${r.level}">${r.level}</span>
     <div class="avatar" style="width:34px;height:34px;font-size:18px">${a?a.avatar:'🧒'}</div>
     <div style="flex:1"><div style="font-weight:700">${a?a.name:'?'} · ${r.book}${r.photo?' <span class="tag" style="background:#eef6fb;color:#15506b">📷 원본</span>':''}</div><div class="muted">${r.date} · ${r.input} ${r.reviewed?'· <span style="color:#15803d">확인✔</span>':'· <span style="color:#b45309">대기</span>'}${r.sim>=60?` · <span style="color:#e11d48">⚠️유사 ${r.sim}%</span>`:''}</div></div>
     <button class="btn out sm" onclick="tOpen('${r.id}')">보기</button>${!r.reviewed?`<button class="btn sm" onclick="tApprove('${r.id}')">확인✔</button>`:''}</div>`;}).join(''):`<div class="empty">아직 제출된 독후감이 없어요.</div>`}
   <div id="tReviewBox"></div></div>`;}
function tCheckAll(){document.querySelectorAll('.revchk').forEach(c=>c.checked=true);}
function tBatchApprove(){const ids=[...document.querySelectorAll('.revchk:checked')].map(c=>c.value);if(!ids.length){toast('승인할 독후감을 체크하세요');return;}ids.forEach(id=>{const r=db.reports.find(x=>x.id===id);if(r)r.reviewed=true;});save();toast(`${ids.length}건 일괄 승인 완료 ✔`);mountTeacher();}
const ENCOURAGE=['오늘도 책 한 권, 정말 멋져! 📚','네 생각이 쑥쑥 자라고 있어 👍','다음 독후감도 기대할게! ✨','꾸준함이 최고야, 잘하고 있어 🌱','선생님은 네 글이 참 좋단다 💛'];
function sendEncourage(id){const a=db.accounts.find(x=>x.id===id);if(!a.notices)a.notices=[];a.notices.push({text:rnd(ENCOURAGE),ts:Date.now(),read:false});save();toast(`${a.name}에게 격려를 보냈어요 💌`);}
function givePoints(id){const a=db.accounts.find(x=>x.id===id);if(!a)return;
  const v=prompt(`${a.name}에게 지급할 포인트를 입력하세요 (1~500)\n예: 좋은 발표 +10, 한 권 완독 +20`,'10');if(v===null)return;
  const n=Math.round(+v);if(!n||n<1||n>500){toast('1~500 사이 숫자를 입력하세요');return;}
  a.points=(a.points||0)+n;const nl=lvlOf(a.points);const up=nl>(a.lvl||1);a.lvl=nl;
  if(!a.notices)a.notices=[];a.notices.push({text:`선생님이 포인트 ${n}P를 선물했어요 🎁`,ts:Date.now(),read:false});
  save();toast(`${a.name}에게 +${n}P 지급${up?` · ${levelName(a.lvl)}로 레벨업! 🎉`:''}`);mountTeacher();}
let tEdit=null;
function tOpen(id){const r=db.reports.find(x=>x.id===id);if(!r)return;const rev=aiReview(r.body);
  tEdit={id,rubric:Object.assign({},r.tRubric||rev.rubric),comment:r.tComment||'',aiRubric:rev.rubric,rev};renderTEdit();}
function tAdj(k,d){if(!tEdit)return;const ci=$('#tComment');if(ci)tEdit.comment=ci.value;tEdit.rubric[k]=Math.max(1,Math.min(5,tEdit.rubric[k]+d));renderTEdit();}
function tApproveFull(id){const r=db.reports.find(x=>x.id===id);const ci=$('#tComment');tEdit.comment=ci?ci.value:'';r.tRubric=Object.assign({},tEdit.rubric);r.tComment=tEdit.comment;r.reviewed=true;
  const cl=calcLevel(tEdit.rubric);r.level=cl.level;r.avg=cl.avg;
  save();toast('최종 승인! 학생에게 선생님 코멘트가 표시돼요 ✔');mountTeacher();}
function renderTEdit(){const r=db.reports.find(x=>x.id===tEdit.id);const a=db.accounts.find(x=>x.id===r.accId);const box=$('#tReviewBox');if(!box)return;
  box.innerHTML=`<div class="card" style="margin-top:14px;background:#fbfcfe"><div class="row"><h2 style="flex:1">${a?a.name:'?'} · ${r.book}</h2><span class="pill ${r.level}">${r.level}</span></div>
   ${photoBlock(r.photo,'학생이 올린 손글씨 원본 (제출 사진)')}

   ${diffCard(r)}
   ${mediaBlock(r)}
   <div class="note" style="margin-bottom:10px">🤖 아래는 AI 초안 점수예요. <b>선생님이 직접 조정</b>하고 한마디를 남겨 <b>최종 승인</b>하세요. (AI는 보조, 평가의 결정과 정서적 격려는 선생님 몫)</div>
   <div style="font-weight:700;font-size:13.5px;margin:6px 0">📊 5축 성취수준 점수 조정</div>
   ${Object.keys(RUBRIC_LABELS).map(k=>`<div class="row" style="gap:8px;margin:5px 0">
     <span style="width:72px;font-size:12.5px;color:var(--mut)">${RUBRIC_LABELS[k]}</span>
     <button class="btn out sm" onclick="tAdj('${k}',-1)">−</button>
     <div class="bar" style="flex:1"><i style="width:${tEdit.rubric[k]/5*100}%"></i></div>
     <b style="width:16px;text-align:center">${tEdit.rubric[k]}</b>
     <button class="btn out sm" onclick="tAdj('${k}',1)">＋</button>
     ${tEdit.aiRubric[k]!==tEdit.rubric[k]?`<span class="tag">AI ${tEdit.aiRubric[k]}</span>`:''}</div>`).join('')}
   <div class="fb-block fb-grow" style="margin-top:8px"><b>🚀 AI 발전 제안 (참고용)</b>${tEdit.rev.grow.map(p=>`<p>· ${p}</p>`).join('')}</div>
   <label>💬 선생님의 따뜻한 한마디</label>
   <textarea id="tComment" placeholder="예) 주인공의 마음을 잘 헤아렸구나! 다음엔 네 경험도 한 줄 더 써볼까?">${tEdit.comment}</textarea>
   <div class="row" style="margin-top:8px"><button class="btn out sm" onclick="tVerify('${r.id}')">🔍 AI 진위 점검 <span class="muted">(베끼기·AI생성 의심 탐지)</span></button></div><div id="tVerifyBox"></div>
   <div class="row" style="justify-content:flex-end;margin-top:10px;gap:8px">${r.reviewed?'<span class="muted">확인 완료 ✔ · 수정 후 다시 승인 가능</span>':''}
     <button class="btn" onclick="tApproveFull('${r.id}')">✔ 코멘트와 함께 최종 승인</button></div>
   </div>`;}
function tApprove(id){db.reports.find(x=>x.id===id).reviewed=true;save();toast('확인 완료 ✔');mountTeacher();}
async function tVerify(id){const r=db.reports.find(x=>x.id===id);if(!aiAvailable()){toast('AI 기능이 설정되지 않았어요(운영자 설정 필요)');return;}const box=$('#tVerifyBox');if(!box)return;box.innerHTML='<div class="note" style="margin-top:8px">🔍 AI가 진위를 분석 중...</div>';
  try{const v=await aiVerifyLLM(r.body,r.book);const c={high:'#15803d',medium:'#b45309',low:'#b91c1c'}[v.verdict]||'#555';const lab={high:'✅ 직접 읽고 썼을 가능성 높음',medium:'⚠️ 판단하기 어려움',low:'🚩 읽지 않고 썼을 가능성(베끼기·AI생성 의심)'}[v.verdict]||v.verdict;
    box.innerHTML=`<div class="note" style="margin-top:8px;border-color:${c}"><b style="color:${c}">${lab}</b><br>${v.reasoning||''}</div>`;}
  catch(e){box.innerHTML='<div class="note" style="margin-top:8px;background:#fef2f2;border-color:var(--rose)">분석 실패: '+e.message+'</div>';}}

     <button class="btn mut sm" onclick="delStudent('${a.id}')">삭제</button></div>`).join('')||'<div class="empty">아직 학생이 없어요.</div>'}

function resetPw(id){const a=db.accounts.find(x=>x.id===id);a.pw='1234';save();toast(`${a.name}의 비밀번호를 1234로 초기화했어요`);mountTeacher();}
function addStudent(){const u=me();const n=($('#newStud').value||'').trim();if(!n){toast('이름을 입력하세요');return;}
  if(classmates(u).find(a=>a.name===n)){toast('같은 이름의 학생이 이미 있어요');return;}
  const s=mkStudent({c:u.schoolCode,n:u.schoolName,r:u.region,g:u.gu},u.grade,u.classNo,n,0);db.accounts.push(s);save();toast(`${n} 학생 추가됨(비번 1234)`);mountTeacher();}

const QUIZGEN_SYS=`당신은 초등 5~6학년 독서 퀴즈 출제 전문가입니다. 주어진 책에 대해, 학생이 그 책을 실제로 읽었는지 확인하는 4지선다 퀴즈 4문항을 만듭니다. 인물·사건·배경·주제 중심으로 너무 지엽적이지 않게 내고, 정답은 명확하며 오답도 그럴듯하게 만드세요. 책 소개(줄거리)가 제공된 경우 반드시 그 내용을 근거로만 문제를 내고, 책 원문 문장을 그대로 인용하지 마세요. 책 소개가 없고 당신이 그 책 내용을 확실히 모르면 지어내지 말고 questions를 빈 배열로 두세요. 반드시 JSON으로만 응답: {"questions":[{"q":"문제","opts":["보기1","보기2","보기3","보기4"],"ans":0}]} (ans는 정답 보기의 인덱스 0~3)`;

/* 독서 포트폴리오 PDF — 5축 방사형 그래프 + 독후감 목록 + 뱃지 (생기부·상담 자료) */
function radarSVG(R){const keys=Object.keys(RUBRIC_LABELS);const cx=130,cy=125,rad=82,n=keys.length;
  const pt=(i,val)=>{const ang=-Math.PI/2+i*2*Math.PI/n;const rr=rad*(val/5);return [cx+Math.cos(ang)*rr,cy+Math.sin(ang)*rr];};
  const grid=[1,2,3,4,5].map(lv=>`<polygon points="${keys.map((_,i)=>{const p=pt(i,lv);return p[0].toFixed(0)+','+p[1].toFixed(0);}).join(' ')}" fill="none" stroke="#e4ebf3"/>`).join('');
  const axes=keys.map((_,i)=>{const p=pt(i,5);return `<line x1="${cx}" y1="${cy}" x2="${p[0].toFixed(0)}" y2="${p[1].toFixed(0)}" stroke="#e4ebf3"/>`;}).join('');
  const poly=keys.map((k,i)=>{const p=pt(i,R[k]||0);return p[0].toFixed(0)+','+p[1].toFixed(0);}).join(' ');
  const labels=keys.map((k,i)=>{const p=pt(i,6.05);return `<text x="${p[0].toFixed(0)}" y="${p[1].toFixed(0)}" font-size="11" text-anchor="middle" fill="#555">${RUBRIC_LABELS[k]}</text>`;}).join('');
  return `<svg viewBox="0 0 260 255" width="250">${grid}${axes}<polygon points="${poly}" fill="rgba(58,160,224,.35)" stroke="#3aa0e0" stroke-width="2"/>${labels}</svg>`;}
function buildPortfolio(id){const a=db.accounts.find(x=>x.id===id);const rs=accReports(a.id);
  const s={content:0,emotion:0,life:0,structure:0,spelling:0};let n=0;rs.forEach(r=>{const rr=r.tRubric||r.rubric||aiReview(r.body).rubric;Object.keys(s).forEach(k=>s[k]+=rr[k]);n++;});if(n)Object.keys(s).forEach(k=>s[k]=Math.round(s[k]/n*10)/10);
  const earned=BADGES.filter(b=>(a.badges||[]).includes(b.id));const lvA=rs.filter(r=>r.level==='A').length;
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${a.name} 독서 포트폴리오</title>
  <style>body{font-family:'Malgun Gothic',sans-serif;padding:34px;color:#1f2937;max-width:820px;margin:0 auto;line-height:1.7}

  @media print{button{display:none}}</style></head><body>

  <h3>1. 독서 성장 한눈에</h3>
  <div class="flex"><div>${n?radarSVG(s):'<div class="muted">아직 데이터가 없어요</div>'}</div>
   <div class="box" style="flex:1;min-width:200px">독후감 <b>${rs.length}편</b> · 우수(A) <b>${lvA}편</b> · 누적 <b>${a.points}</b>포인트<br>
    5축 평균: ${Object.keys(RUBRIC_LABELS).map(k=>RUBRIC_LABELS[k]+' '+(s[k]||0)).join(' · ')}</div></div>
  <h3>2. 읽고 쓴 책 (${rs.length}권)</h3>
  <table><tr><th>날짜</th><th>책</th><th>방법</th><th>성취수준</th></tr>
   ${rs.map(r=>`<tr><td>${r.date}</td><td style="text-align:left">${r.book}</td><td>${r.input}</td><td>${r.level}</td></tr>`).join('')||'<tr><td colspan=4>아직 없음</td></tr>'}</table>

  <p class="muted" style="margin-top:18px">본 포트폴리오는 책갈피가 학생의 독서활동 데이터로 자동 생성했습니다. (생활기록부 독서활동·학부모 상담 자료로 활용 가능)</p>
  <button onclick="window.print()" style="padding:10px 18px;font-size:15px">🖨️ 인쇄/PDF 저장</button></body></html>`;}

/* 학급 성장 리포트(교사 인쇄) */
function buildClassReport(){const u=me();const reps=classReports(u);const studs=classmates(u);
  const R=classRubric(u)||{content:0,emotion:0,life:0,structure:0,spelling:0};
  const lvA=reps.filter(r=>r.level==='A').length,lvB=reps.filter(r=>r.level==='B').length,lvC=reps.filter(r=>r.level==='C').length;
  const imps=reps.filter(r=>r.improvement>0);const top=studs.slice().sort((a,b)=>b.points-a.points).slice(0,5);
  const weak=Object.keys(R).reduce((a,b)=>R[a]<=R[b]?a:b);
  const bar=v=>`<span style="background:#eef2f7;border-radius:6px;height:13px;width:150px;display:inline-block;vertical-align:middle"><span style="display:inline-block;height:13px;border-radius:6px;background:#3cb4e8;width:${v/5*100}%;vertical-align:top"></span></span>`;
  return `<!DOCTYPE html><html><head><meta charset=utf-8><title>학급 성장 리포트</title>
  <style>body{font-family:'Malgun Gothic',sans-serif;padding:36px;color:#1f2937;max-width:820px;margin:0 auto}
  h1{color:#0d1b3a}h3{margin-top:22px}table{border-collapse:collapse;width:100%;margin:8px 0}td,th{border:1px solid #e4ebf3;padding:7px;font-size:13.5px;text-align:center}
  .muted{color:#6b7280}@media print{button{display:none}}</style></head><body>
  <h1>📖 책갈피 학급 성장 리포트</h1>
  <p class="muted">${u.schoolName} ${u.grade}학년 ${u.classNo}반 · 담임 ${u.name} · 2026-06-29</p>
  <h3>1. 개요</h3><p>학생 ${studs.length}명 · 총 독후감 ${reps.length}편 · 평균 ${studs.length?Math.round(studs.reduce((s,a)=>s+a.points,0)/studs.length):0}P<br>
  성취수준 분포 — A ${lvA} / B ${lvB} / C ${lvC} (A·B ${reps.length?Math.round((lvA+lvB)/reps.length*100):0}%)<br>
  고쳐쓰기 향상 사례 ${imps.length}건 (평균 +${imps.length?(imps.reduce((s,r)=>s+r.improvement,0)/imps.length).toFixed(1):0}점)</p>
  <h3>2. 5축 루브릭 평균</h3><table><tr><th>영역</th><th>점수</th><th>그래프</th></tr>
   ${Object.keys(R).map(k=>`<tr><td>${RUBRIC_LABELS[k]}</td><td>${R[k]}</td><td>${bar(R[k])}</td></tr>`).join('')}</table>
  <p>→ 상대적 약점: <b>${RUBRIC_LABELS[weak]}</b> · 추천 활동: ${ACT[weak]} (성취기준 ${RUBRIC_STD[weak]})</p>
  <h3>3. 성장 우수 학생</h3><table><tr><th>순위</th><th>이름</th><th>포인트</th><th>독후감</th><th>최근 수준</th></tr>
   ${top.map((a,i)=>{const last=accReports(a.id)[0];return `<tr><td>${i+1}</td><td>${a.name}</td><td>${a.points}</td><td>${accReports(a.id).length}</td><td>${last?last.level:'-'}</td></tr>`;}).join('')}</table>
  <p class="muted" style="margin-top:18px">본 리포트는 책갈피가 학급 독후감 데이터로 자동 생성했습니다. (효과 검증·수업 설계 자료)</p>
  <button onclick="window.print()" style="padding:10px 18px;font-size:15px">🖨️ 인쇄/PDF 저장</button></body></html>`;}
function printClassReport(){openHTML(buildClassReport());}
function exportCSV(){const u=me();const reps=classReports(u);const head=['이름','책','성취수준','평균점수','향상도','유사도%','입력','날짜','챌린지','미션','교사확인'];
  const rows=reps.map(r=>{const a=db.accounts.find(x=>x.id===r.accId);return [a?a.name:'',r.book,r.level,r.avg!=null?r.avg:'',r.improvement||0,r.sim||0,r.input,r.date,r.challengeId?'Y':'',r.missionId?'Y':'',r.reviewed?'Y':''];});
  const csv=[head,...rows].map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`책갈피_${u.schoolName}_${u.grade}-${u.classNo}_독후감.csv`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);toast('CSV로 내보냈어요 (연구 원자료 보관용)');}

/* 유사도(표절 의심) 간이 점검 — 데모: 3-gram Jaccard. 실서비스: 표절검사 API */
function simText(a,b){const g=s=>{const set=new Set();const t=(s||'').replace(/\s/g,'');for(let i=0;i<t.length-2;i++)set.add(t.slice(i,i+3));return set;};
  const A=g(a),B=g(b);if(!A.size||!B.size)return 0;let inter=0;A.forEach(x=>{if(B.has(x))inter++;});return inter/(A.size+B.size-inter);}
function maxSim(text,uid){let m=0,who=null;db.reports.filter(r=>r.accId!==uid).forEach(r=>{const s=simText(text,r.body);if(s>m){m=s;who=r;}});return{sim:Math.round(m*100),who};}

function __boot(){
  try{ db=DB.load(); if(!db||db._v!==DB_VERSION) seed(); render(); }
  catch(err){
    var a=document.getElementById('app');
    if(a) a.innerHTML='<div style="padding:18px;margin:14px;background:#fff5f5;border:1px solid #f3cccc;border-radius:12px;color:#b91c1c;font-size:13px;line-height:1.6;white-space:pre-wrap">⚠️ 시작 중 오류가 발생했어요. 이 화면을 캡처해 보내 주세요.\n\n'+((err&&err.message)||err)+'\n\n'+((err&&err.stack)||'')+'</div>';
  }
}
window.addEventListener('error',function(e){var a=document.getElementById('app');if(a&&!a.innerHTML.trim())a.innerHTML='<div style="padding:18px;margin:14px;background:#fff5f5;border:1px solid #f3cccc;border-radius:12px;color:#b91c1c;font-size:13px;white-space:pre-wrap">⚠️ 스크립트 오류: '+(e.message||'')+'\n'+(e.filename||'')+':'+(e.lineno||'')+'</div>';});
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',__boot); else __boot();
